[runtime]
mode = "live"
real_user_shadow_smoke = false

[polymarket.source]
clob_host = "https://clob.polymarket.com"
data_api_host = "https://data-api.polymarket.com"
relayer_host = "https://relayer-v2.polymarket.com"
market_ws_url = "wss://ws-subscriptions-clob.polymarket.com/ws/market"
user_ws_url = "wss://ws-subscriptions-clob.polymarket.com/ws/user"
heartbeat_interval_seconds = 15
relayer_poll_interval_seconds = 5
metadata_refresh_interval_seconds = 60

[polymarket.account]
address = "0xYOUR_ADDRESS"
# For a normal EOA this is usually the same as `address`.
funder_address = "0xYOUR_FUNDER_ADDRESS"
signature_type = "eoa"
wallet_route = "eoa"
api_key = "YOUR_API_KEY"
secret = "YOUR_API_SECRET"
passphrase = "YOUR_PASSPHRASE"
# L2 auth timestamp/signature are derived at startup. Do not hand-author them here.

[polymarket.relayer_auth]
kind = "relayer_api_key"
api_key = "YOUR_RELAYER_API_KEY"
address = "0xYOUR_RELAYER_API_KEY_ADDRESS"

# Builder API key operators can switch to this shape instead:
# [polymarket.relayer_auth]
# kind = "builder_api_key"
# api_key = "YOUR_BUILDER_API_KEY"
# secret = "YOUR_BUILDER_SECRET"
# passphrase = "YOUR_BUILDER_PASSPHRASE"

[negrisk.target_source]
source = "adopted"

[negrisk.rollout]
approved_families = []
ready_families = []
