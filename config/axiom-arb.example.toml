[runtime]
mode = "live"
real_user_shadow_smoke = false

# Operators normally omit source config; the built-in defaults apply.
# Use [polymarket.source_overrides] only for non-default endpoints or cadence.
# If Polymarket traffic must traverse an outbound proxy, set HTTPS_PROXY / ALL_PROXY
# in the environment instead. Use HTTP_PROXY only for http/ws endpoint overrides.

[polymarket.account]
address = "0xYOUR_ADDRESS"
# For a normal EOA this is usually the same as `address`.
funder_address = "0xYOUR_FUNDER_ADDRESS"
signature_type = "eoa"
wallet_route = "eoa"
api_key = "YOUR_API_KEY"
secret = "YOUR_API_SECRET"
passphrase = "YOUR_PASSPHRASE"
# L2 auth timestamp/signature are derived at startup. Do not hand-author them here.

[polymarket.relayer_auth]
kind = "relayer_api_key"
api_key = "YOUR_RELAYER_API_KEY"
address = "0xYOUR_RELAYER_API_KEY_ADDRESS"

# Builder API key operators can switch to this shape instead:
# [polymarket.relayer_auth]
# kind = "builder_api_key"
# api_key = "YOUR_BUILDER_API_KEY"
# secret = "YOUR_BUILDER_SECRET"
# passphrase = "YOUR_BUILDER_PASSPHRASE"

[strategy_control]
source = "adopted"
operator_strategy_revision = "strategy-rev-12"

[strategies.full_set]
enabled = true

[strategies.neg_risk]
enabled = true

[strategies.neg_risk.rollout]
approved_scopes = []
ready_scopes = []
