services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: axiom
      POSTGRES_DB: axiom_arb
    ports:
      - "5432:5432"
    volumes:
      - axiom-arb-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom -d axiom_arb"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  axiom-arb-postgres:
